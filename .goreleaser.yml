version: 2

project_name: gitto

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - main: .
    binary: gitto
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - darwin
      - linux
    goarch:
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - repository:
      owner: jack-braga
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/jack-braga/gitto"
    description: "Multi-repo Git TUI workspace manager"
    license: "MIT"
    install: |
      bin.install "gitto"
    test: |
      system "#{bin}/gitto", "--version"
